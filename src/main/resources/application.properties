# --- Configuración de conexión a MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/mbl?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Tokai

# --- Configuración JPA/Hibernate ---
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola
spring.jpa.show-sql=true

# Formatear SQL "bonito"
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Nombre de la aplicación ---
spring.application.name=mbrl

server.port=8080

# --- Configuración de subida de imágenes ---
app.upload.dir=uploads/images
app.upload.max-size=5242880
app.base-url=http://localhost:8080

# --- Límites de subida de archivos ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# --- Configuración JWT ---
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsNowMuchLongerAndBetterToEnsureHasAtLeast512BitsForHS512AlgorithmSecurityStandard
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# --- Configuración de Email ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu-email@gmail.com
spring.mail.password=tu-contraseńa-app
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=noreply@mbrl.com

# --- URL de Reset de Contraseńa (para desarrollo) ---
app.reset-password-url=http://localhost:3000/reset-password

